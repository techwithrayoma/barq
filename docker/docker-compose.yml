services:

  # ---------------- FASTAPI ----------------
  fastapi:
    build:
      context: ../
      dockerfile: docker/tubemood/Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    env_file:
      - ./env/.env.fastapi
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: always

  # ---------------- POSTGRES ----------------
  postgres:
    image: postgres:17-bookworm
    container_name: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./env/.env.postgres
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------- LADYBUG APP ----------------
  ladybug:
    build:
      context: ../
      dockerfile: docker/ladybug/Dockerfile
    container_name: ladybug
    ports:
      - "8001:8001"
    env_file:
      - ./env/.env.ladybug
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../:/app
      - ../docker/shared:/shared
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: always

  # ---------------- MLFlow ----------------
  mlflow:
    build:
      context: ../
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlflow
    ports:
      - "5001:5000"
    env_file:
      - ./env/.env.mlflow
    networks:
      - backend
    restart: always
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root s3://your_bucket/mlflow

  # ---------------- RABBITMQ ----------------
  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP — RunPod connects here (expose via ngrok/public IP)
      - "15672:15672"  # Management UI — http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    env_file:
      - ./env/.env.rabbitmq
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      timeout: 10s
      retries: 5

  # ---------------- REDIS ----------------
  redis:
    image: redis:8.0.3-alpine
    container_name: redis
    ports:
      - "6379:6379"    # RunPod connects here for result backend
    volumes:
      - redis_data:/data
    env_file:
      - ./env/.env.redis
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ladybug_redis_2222}", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-ladybug_redis_2222}


  # ---------------- CELERY CPU WORKER ----------------
  celery_worker:
    build:
      context: ../
      dockerfile: docker/ladybug/Dockerfile
    container_name: celery_worker
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../:/app
    command: >
      celery -A app.celery_app:celery_app worker
      --loglevel=info
      --queues=cpu
      --hostname=cpu-worker@%h
      --concurrency=4
    env_file:
      - ./env/.env.ladybug
    depends_on:
      postgres:
        condition: service_healthy
      ladybug:
        condition: service_started
    networks:
      - backend
    restart: always

  # ---------------- AIRFLOW WEBSERVER ----------------
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    depends_on:
      - postgres
      - redis
    env_file:
      - ./env/.env.airflow
    volumes:
      - ../docker/airflow/dags:/opt/airflow/dags
      - ../docker/airflow/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - backend
    restart: always

  # ---------------- AIRFLOW SCHEDULER ----------------
  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    depends_on:
      - airflow-webserver
      - postgres
      - redis
    env_file:
      - ./env/.env.airflow
    volumes:
      - ../docker/airflow/dags:/opt/airflow/dags
      - ../docker/airflow/logs:/opt/airflow/logs
    command: scheduler
    networks:
      - backend
    restart: always

  # ---------------- AIRFLOW WORKER ----------------
  airflow-worker:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow-worker
    depends_on:
      - airflow-webserver
      - postgres
      - redis
    env_file:
      - ./env/.env.airflow
    volumes:
      - ../docker/airflow/dags:/opt/airflow/dags
      - ../docker/airflow/logs:/opt/airflow/logs
    command: celery worker
    networks:
      - backend
    restart: always

# ---------------- NETWORKS & VOLUMES ----------------
networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data: